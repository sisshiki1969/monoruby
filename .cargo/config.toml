[build]
rustflags = ["-Cforce-frame-pointers=yes"]

# aarch64 cross-compilation + qemu-user test runner.
# Enables `cargo build/test --target aarch64-unknown-linux-gnu` on an x86-64
# host: link with the GNU cross toolchain and execute the resulting AArch64
# binaries (incl. test harnesses) under qemu user-mode emulation.
# Toolchain provisioning is handled by `bin/setup-aarch64-cross`.
[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"
runner = "qemu-aarch64 -L /usr/aarch64-linux-gnu"
