[package]
name = "monoruby"
version = "0.3.0"
authors = ["monochrome <sisshiki@mac.com>"]
description = "another CRuby implementation with JIT compiler."
repository = "https://github.com/sisshiki1969/monoruby"
edition = "2024"
license = "MIT OR Apache-2.0"
default-run = "monoruby"
build = "build.rs"

[[bin]]
name = "monoruby"

[[bin]]
name = "irm"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
default = []
dump-bc = []
dump-traceir = []
emit-asm = ["dump-bc", "dump-traceir", "jit-log"]
emit-bc = ["dump-bc", "dump-traceir"]
jit-log = []
jit-debug = ["dump-traceir"]
no-jit = []
deopt = ["jit-log", "dump-bc", "dump-traceir"]
gc-log = []
gc-debug = []
gc-stress = []
# Force PHYS_XMM_POOL down to 2 so almost every Float-resident slot
# becomes a spilled VirtFPReg. Used in CI to stress-test the spill
# code paths (LoadSpill / StoreSpill, spill-aware AsmInst lowerings,
# 16-byte spill-region alignment).
stress-spill-pool = []
profile = ["dump-bc", "dump-traceir"]
perf = []
emit-cfg = ["dump-bc", "dump-traceir"]
dump-require = []

[dependencies]
clap = { version = "4.6.1", features = ["derive"] }
rustyline = "18.0.0"
paste = "1.0.15"
monoasm_macro = { git = "https://github.com/sisshiki1969/monoasm.git", branch = "rc" }
monoasm = { git = "https://github.com/sisshiki1969/monoasm.git", branch = "rc" }
onigmo-regex = { git = "https://github.com/sisshiki1969/onigmo-regex.git" }
ruruby-parse = { path = "../ruruby-parse" }
ruby-prism = { git = "https://github.com/sisshiki1969/prism.git", rev = "28752c89d0da012d91794cf10bd5f8d7225cc32d" }
monoruby-attr = { path = "../monoruby_attr" }
rubymap = { path = "../rubymap" }
indexmap = "2.14.0"
num = "0.4.3"
fxhash = "0.2.1"
tempfile = "3.27.0"
dtoa = "1.0.11"
chrono = "0.4.44"
smallvec = { git = "https://github.com/sisshiki1969/rust-smallvec.git", features = [
  "const_generics",
] }
escape_string = "0.1.2"
hex = "0.4.3"
rand = "0.9.1"
regex = "1.12.3"
libc = "0.2.186"
getrandom = "0.3.3"
rand_mt = { version = "5.0.0", features = ["rand-traits"] }
bitvec = "1.0.1"
ansi_term = "0.12.1"
dirs = "6.0.0"
globset = "0.4.14"
html-escape = "0.2.13"
unicode-general-category = "1.0.0"
unicode-normalization = "0.1.25"
unicode-segmentation = "1.13.2"
signal-hook = "0.4.4"
divrem = "1.0.0"
libffi = "5.1.0"

[build-dependencies]
dirs = "6.0.0"
