name: Rust

on:
  push:
    branches: [master, "darwin*"]
  pull_request:
    branches: [master, "darwin*"]

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.1"
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest

      - name: Clone optcarrot
        run: git clone https://github.com/mame/optcarrot.git ../optcarrot
      - name: Clone ruby/spec
        run: |
          git clone --depth 1 https://github.com/ruby/spec.git ../spec
          git clone --depth 1 https://github.com/ruby/mspec.git ../mspec
      - name: Clone ruby-bench
        run: git clone --depth 1 https://github.com/ruby/ruby-bench.git ../ruby-bench
      - name: Install ruby-bench gem dependencies
        # bin/ruby-bench-diff requires `erubi`. The other benchmarks
        # only use stdlib gems, so a single explicit install is enough.
        run: gem install erubi --no-document
      - name: Test
        run: bin/test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # not required for public repos
          files: lcov.info
          flags: x86_64
          fail_ci_if_error: true

  darwin:
    # TEMPORARY DIAGNOSTIC JOB (PR #650, draft). The full bin/test fails only on
    # the GitHub macos-latest (M1) runner under gc-stress + stress-spill-pool —
    # a value gets freed mid-flight (String -> INVALID(255)) and SIGABRTs in
    # arithmetic_sequence_generic_count_via_size. It does NOT reproduce on a
    # local Apple Silicon Mac or under qemu-user. This job isolates the trigger:
    # the single failing test, across feature combos, each in isolation. Reverts
    # to the real bin/test run once the race is localized.
    runs-on: macos-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.1"
      - name: Install libffi + pkg-config
        run: |
          brew install libffi pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix libffi)/lib/pkgconfig" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@nextest

      - name: Diagnose aarch64 JIT race under stress
        run: |
          # Step 1 (previous commit) showed the failing test PASSes in isolation
          # on this M1 runner even with both stress features and even running its
          # whole module — the SIGABRT only appears in the FULL parallel nextest
          # run. nextest runs each test in its own process, so this points at
          # inter-process resource/timing pressure (parallel gc-stress). Step 2:
          # run the FULL suite serially (--test-threads=1) under both features.
          # PASS  => parallel resource/memory pressure is the trigger.
          # FAIL  => cumulative/other; not parallelism.
          echo "::group::full-suite serial :: --test-threads=1, gc-stress+stress-spill-pool"
          if cargo nextest run --features gc-stress,stress-spill-pool --test-threads 1 \
               >/tmp/diag.out 2>&1; then
            echo "RESULT [full-serial] = PASS"
          else
            echo "RESULT [full-serial] = FAIL (exit $?)"
          fi
          grep -aE 'SIGABRT|panicked|assertion|INVALID|left:|right:|Summary|tests run|test result|FAILED' \
            /tmp/diag.out | tail -40 || true
          echo "::endgroup::"
          echo "=== diagnostic complete (step intentionally exits 0) ==="

