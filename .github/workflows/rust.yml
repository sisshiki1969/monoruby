name: Rust

on:
  push:
    branches: [master, "darwin*"]
  pull_request:
    branches: [master, "darwin*"]

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.1"
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest

      - name: Clone optcarrot
        run: git clone https://github.com/mame/optcarrot.git ../optcarrot
      - name: Clone ruby/spec
        run: |
          git clone --depth 1 https://github.com/ruby/spec.git ../spec
          git clone --depth 1 https://github.com/ruby/mspec.git ../mspec
      - name: Clone ruby-bench
        run: git clone --depth 1 https://github.com/ruby/ruby-bench.git ../ruby-bench
      - name: Install ruby-bench gem dependencies
        # bin/ruby-bench-diff requires `erubi`. The other benchmarks
        # only use stdlib gems, so a single explicit install is enough.
        run: gem install erubi --no-document
      - name: Test
        run: bin/test

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # not required for public repos
          files: lcov.info
          flags: x86_64
          fail_ci_if_error: true

  darwin:
    # TEMPORARY DIAGNOSTIC JOB (PR #650, draft). The full bin/test fails only on
    # the GitHub macos-latest (M1) runner under gc-stress + stress-spill-pool —
    # a value gets freed mid-flight (String -> INVALID(255)) and SIGABRTs in
    # arithmetic_sequence_generic_count_via_size. It does NOT reproduce on a
    # local Apple Silicon Mac or under qemu-user. This job isolates the trigger:
    # the single failing test, across feature combos, each in isolation. Reverts
    # to the real bin/test run once the race is localized.
    runs-on: macos-latest
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.1"
      - name: Install libffi + pkg-config
        run: |
          brew install libffi pkg-config
          echo "PKG_CONFIG_PATH=$(brew --prefix libffi)/lib/pkgconfig" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@nightly
        with:
          toolchain: nightly
      - uses: taiki-e/install-action@nextest

      - name: Diagnose aarch64 JIT race under stress
        run: |
          T='arithmetic_sequence_generic_count_via_size'
          run() {
            local label="$1"; shift
            echo "::group::$label  ::  $*"
            if "$@" >/tmp/diag.out 2>&1; then
              echo "RESULT [$label] = PASS"
            else
              echo "RESULT [$label] = FAIL (exit $?)"
              grep -aE 'SIGABRT|panicked|assertion|INVALID|left:|right:|Summary|test result|FAILED' /tmp/diag.out | head -25 || true
            fi
            echo "::endgroup::"
          }
          # Single failing test in isolation, across feature combos. If it FAILs
          # in isolation, the race is intrinsic to this test's JIT codegen; if it
          # PASSes here but the full suite FAILs, it is load/parallelism-driven.
          run both-iso      cargo nextest run --features gc-stress,stress-spill-pool -E "test($T)"
          run gcstress-iso  cargo nextest run --features gc-stress                   -E "test($T)"
          run spillpool-iso cargo nextest run --features stress-spill-pool           -E "test($T)"
          run nostress-iso  cargo nextest run                                        -E "test($T)"
          # Whole arithmetic_sequence module under both stress features (does
          # running the neighbouring tests in the same process matter?).
          run both-module   cargo nextest run --no-fail-fast --features gc-stress,stress-spill-pool -E "test(arithmetic_sequence)"
          echo "=== diagnostic complete (step intentionally exits 0) ==="

